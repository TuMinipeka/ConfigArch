#  ◈ KEYBINDINGS (AUTOGENERATED)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Static Core Binds ─────────
gesture = 3, horizontal, workspace
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ───────── Dynamic Settings Binds ─────────
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 0

bind = SUPER_SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER_SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER_SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER_SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER_SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER_SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER_SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER_SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER_SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER_SHIFT, 0, movetoworkspacesilent, 0

bindl = SUPER, left, workspace, -1
bindl = SUPER, right, workspace, +1

# ───────── quickshell ─────────
bind = SUPER, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery #Battery
bind = SUPER, D, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher #AppLauncher
bind = SUPER, E, exec, nautilus #Administrador de archivos
bind = SUPER, F, exec, google-chrome-stable #Navegador web
bind = SUPER, H, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide #Guia
bind = SUPER, N, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network #Red
bind = SUPER, P, exec, ~/.config/hypr/scripts/qs_manager.sh toggle movies #Peliculas
bind = SUPER, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume #Volumen
bind = SUPER, O, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper #Wallpaper
bind = SUPER, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors #Monitores
bind = SUPER, R, exec, bash ~/.config/hypr/scripts/reload.sh #Recargar
bind = SUPER, Q, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music #Musica
bind = SUPER, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar #Calendario
bindel = SUPER, L, exec, bash ~/.config/hypr/scripts/lock.sh #Bloquear
bind = SUPER, C, exec, hyprctl dispatch killactive #Cerrar aplicacion
bindl = SUPER, escape, exec, ~/.config/hypr/scripts/screenshot.sh #Screenshot
bind = SUPER, T, exec, $terminal #Terminal
bindl = SUPER, SPACE, exec, hyprctl dispatch togglefloating #Reproducir/Pausar
bind = SUPER SHIFT_L, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle settings #Ajustes
bind = SUPER SHIFT_L, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime #Temporizador
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock #Caps Lock

# ───────── Volumen ─────────
bindel = , xf86audiolowervolume, exec, swayosd-client --output-volume lower #Bajar volumen
bindel = , xf86audioraisevolume, exec, swayosd-client --output-volume raise #Subir volumen
bindl = , xf86audiomute, exec, swayosd-client --output-volume mute-toggle #Silenciar volumen
bind = SUPER, XF86AudioRaiseVolume, exec, brightnessctl set +10% #Subir brillo
bind = SUPER, XF86AudioLowerVolume, exec, brightnessctl set 10%- #Bajar brillo

# Abrir Visual Studio Code con el botón 275
bind = $mainMod, mouse:276, exec, code

# Abrir Spotify con el botón 276
bind = $mainMod, mouse:275, exec, spotify

#Abrir terminal Edex-ui
bind = ALT,P, exec, edex-ui